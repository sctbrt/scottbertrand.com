  <!-- Fonts -->
  <link rel="stylesheet" href="https://use.typekit.net/dmk8daz.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Lora:ital,wght@1,400;1,500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F7F4EF;
      --text: #2C2520;
      --text-muted: #8C7E73;
      --text-subtle: #B5A99B;
      --accent: #C45A20;
      --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
    }

    html { color-scheme: light; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ========================================
       SEQUENCE:
       0.0s  — blank. Silence.
       0.8s  — horizontal line sweeps left to right
       1.6s  — "SCOTT BERTRAND" clips up
       2.8s  — name settles (scale)
       3.2s  — capability line fades in
       3.6s  — tagline clips up
       4.0s  — studio link rises in
       4.4s  — footer fades in
       ======================================== */

    .stage {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 900px;
    }

    .signal-dots {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
      opacity: 0;
      animation: softFade 0.6s ease 0.2s forwards;
    }

    .signal-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      opacity: 0;
    }

    .signal-dot--orange {
      background: #C45A20;
      animation: dotSweep 1.8s ease 0.3s forwards;
    }
    .signal-dot--purple {
      background: #7C5CBA;
      animation: dotSweep 1.8s ease 0.6s forwards;
    }
    .signal-dot--blue {
      background: #3B82C4;
      animation: dotSweep 1.8s ease 0.9s forwards;
    }

    @keyframes dotSweep {
      0% { opacity: 0; }
      30% { opacity: 1; }
      60% { opacity: 0.25; }
      100% { opacity: 0.85; }
    }

    .name-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform: scale(1);
      animation: nameSettle 1.6s var(--ease-expo) 2.8s forwards;
    }

    .full-name {
      overflow: hidden;
      line-height: 1.0;
    }

    .full-name span {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: clamp(2.4rem, 7vw, 5.2rem);
      display: block;
      transform: translateY(120%);
      letter-spacing: 0.06em;
      animation: clipUp 1.1s var(--ease-expo) 1.6s forwards;
      white-space: nowrap;
    }

    .stage-line {
      width: 0;
      height: 1px;
      background: var(--text-subtle);
      align-self: stretch;
      animation: lineSweep 1.4s var(--ease-in-out) 0.8s forwards;
    }

    .capability-line {
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      font-size: 0.65rem;
      line-height: 1.1;
      color: var(--text-subtle);
      letter-spacing: 0.08em;
      padding-top: 14px;
      white-space: nowrap;
      opacity: 0;
      animation: softFade 1.0s ease 3.2s forwards;
    }

    .capability-sep {
      margin: 0 1em;
      font-size: 0.5rem;
      opacity: 0.6;
    }

    .below {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 32px;
      width: 100%;
    }

    .tagline-mask {
      overflow: hidden;
      padding: 4px 0;
    }

    .tagline {
      font-family: 'Lora', serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      line-height: 1.6;
      color: var(--text-muted);
      transform: translateY(120%);
      animation: clipUp 1.0s var(--ease-expo) 3.6s forwards;
    }

    .links {
      margin-top: 24px;
      opacity: 0;
      transform: translateY(14px);
      animation: riseIn 0.9s var(--ease-out-quart) 4.0s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .links a {
      font-family: halyard-display, 'Outfit', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      padding: 10px 0 2px;
      position: relative;
      transition: color 0.3s ease, letter-spacing 0.5s var(--ease-expo);
    }

    .links a::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 1px;
      background: var(--accent);
      transition: width 0.5s var(--ease-expo);
    }

    .links a:hover {
      color: var(--text);
      letter-spacing: 0.2em;
    }

    .links a:hover::after {
      width: 100%;
    }

    .links-label {
      font-family: 'Outfit', sans-serif;
      font-size: 0.55rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--text-subtle);
    }

    .footer-links {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 28px;
      opacity: 0;
      animation: softFade 1.0s ease 4.4s forwards;
      z-index: 10;
    }

    .footer-links a {
      font-family: 'Outfit', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 0.6rem;
      font-weight: 400;
      color: var(--text-subtle);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .footer-links a:hover {
      color: var(--text-muted);
    }

    @keyframes lineSweep {
      0% { width: 0; left: 0; }
      100% { width: 100%; left: 0; }
    }

    @keyframes clipUp {
      0% { transform: translateY(120%); }
      100% { transform: translateY(0%); }
    }

    @keyframes nameSettle {
      0% { transform: scale(1); }
      100% { transform: scale(0.82); }
    }

    @keyframes riseIn {
      0% { opacity: 0; transform: translateY(14px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes softFade {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .full-name span,
      .tagline { transform: none; animation: none; opacity: 1; }
      .stage-line { animation: none; width: 100%; }
      .name-block { animation: none; transform: scale(0.82); }
      .capability-line { animation: none; opacity: 1; }
      .links { animation: softFade 0.3s ease 0.3s forwards; transform: none; }
      .footer-links { animation: softFade 0.3s ease 0.4s forwards; }
    }

    @media (max-width: 600px) {
      body {
        padding: 80px 20px 100px;
        min-height: 100vh;
        min-height: 100dvh;
      }
      .stage {
        min-height: auto;
      }
      .below { padding-top: 24px; }
      .full-name span {
        font-size: clamp(1.6rem, 7.5vw, 2.6rem);
        letter-spacing: 0.05em;
      }
      .capability-line {
        font-size: 0.5rem;
        padding-top: 10px;
      }
      .capability-sep { margin: 0 0.6em; }
      .tagline {
        font-size: 0.95rem;
        padding: 0 10px;
      }
      .links { margin-top: 20px; }
      .footer-links {
        gap: 20px;
        bottom: 28px;
      }
    }

    /* Very small screens */
    @media (max-width: 380px) {
      .full-name span {
        font-size: 1.4rem;
        letter-spacing: 0.04em;
      }
      .capability-line {
        font-size: 0.42rem;
      }
      .tagline {
        font-size: 0.85rem;
      }
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>

  <div class="stage">
    <div class="signal-dots" aria-hidden="true">
      <div class="signal-dot signal-dot--orange"></div>
      <div class="signal-dot signal-dot--purple"></div>
      <div class="signal-dot signal-dot--blue"></div>
    </div>

    <div class="name-block">
      <div class="full-name"><span>SCOTT BERTRAND</span></div>
    </div>

    <div class="stage-line"></div>

    <div class="capability-line" aria-label="Capability domains">
      <span>Brand</span><span class="capability-sep">&bull;</span><span>Design</span><span class="capability-sep">&bull;</span><span>Strategy</span>
    </div>

    <div class="below">
      <div class="tagline-mask">
        <p class="tagline">Design, strategy, and the details between.</p>
      </div>
      <nav class="links">
        <a href="https://bertrandbrands.com">Bertrand Brands</a>
        <span class="links-label">Design Studio</span>
      </nav>
    </div>
  </div>

  <div class="footer-links">
    <a href="mailto:scott@bertrandgroup.ca">Email</a>
  </div>


</body>
</html>
